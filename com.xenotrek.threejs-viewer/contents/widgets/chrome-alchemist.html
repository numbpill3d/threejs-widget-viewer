<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGNAL_GHOST.EXE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0800;
      --bg-panel: #130f04;
      --bg-deep: #080500;
      --accent: #ffb000;
      --accent-dim: rgba(255,176,0,0.35);
      --accent-glow: rgba(255,176,0,0.12);
      --text: #ffe4a0;
      --text-muted: #997a30;
      --border: #3a2800;
      --red: #ff4400;
      --green: #aaff44;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .crt-overlay {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      animation: flicker 6s infinite;
    }
    .crt-overlay::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
    }
    @keyframes flicker {
      0%,94%,96%,100% { opacity: 1; }
      95% { opacity: 0.92; }
    }
    .widget {
      width: 520px;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px var(--accent-glow), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
    }
    /* title bar */
    .titlebar {
      background: var(--accent);
      color: var(--bg);
      font-family: 'VT323', monospace;
      font-size: 18px;
      padding: 3px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.08em;
    }
    .titlebar-btns { display: flex; gap: 4px; }
    .tbtn {
      width: 14px; height: 14px;
      background: var(--bg);
      border: 1px solid var(--bg-deep);
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--accent);
      font-family: 'VT323', monospace;
    }
    .tbtn:hover { background: var(--bg-deep); }
    /* 3d scene */
    #ghost-canvas {
      display: block;
      width: 100%;
      height: 260px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    #ghost-canvas canvas { display: block; }
    .noise-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      mix-blend-mode: overlay;
    }
    /* status strip */
    .status-strip {
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.05em;
    }
    .status-online { color: var(--green); }
    .status-warn { color: var(--red); animation: blink 1.4s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    /* readout panels */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }
    .panel {
      padding: 10px 12px;
      border-right: 1px solid var(--border);
    }
    .panel:last-child { border-right: none; }
    .panel-label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .panel-value {
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-dim);
      line-height: 1;
    }
    .panel-value.bad { color: var(--red); text-shadow: 0 0 12px rgba(255,68,0,0.4); }
    .panel-sub {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    /* log terminal */
    .log-area {
      background: var(--bg-deep);
      padding: 8px 12px;
      height: 90px;
      overflow-y: scroll;
      border-bottom: 1px solid var(--border);
    }
    .log-area::-webkit-scrollbar { width: 6px; }
    .log-area::-webkit-scrollbar-track { background: var(--bg-deep); }
    .log-area::-webkit-scrollbar-thumb { background: var(--accent-dim); border: 1px solid var(--accent); }
    .log-line {
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .log-line .ts { color: var(--text-muted); opacity: 0.5; }
    .log-line .msg { color: var(--text); }
    .log-line .err { color: var(--red); }
    .log-line .ok { color: var(--green); }
    /* bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: var(--bg-panel);
    }
    .mode-btns { display: flex; gap: 6px; }
    .mode-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      background: var(--bg-deep);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: color 100ms, border-color 100ms, background 100ms;
    }
    .mode-btn:hover, .mode-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--bg-deep);
      box-shadow: 0 0 6px var(--accent-dim);
    }
    .clock {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--accent-dim);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="widget">
    <div class="titlebar">
      <span>SIGNAL_GHOST.EXE</span>
      <div class="titlebar-btns">
        <div class="tbtn">_</div>
        <div class="tbtn">[]</div>
        <div class="tbtn">X</div>
      </div>
    </div>
    <div id="ghost-canvas">
      <div class="noise-overlay"></div>
    </div>
    <div class="status-strip">
      <span>NODE: <span class="status-online">// ACTIVE</span></span>
      <span id="entropy-val">ENTROPY: 0.000</span>
      <span class="status-warn" id="fragment-warn">FRAGMENTATION DETECTED</span>
    </div>
    <div class="panels">
      <div class="panel">
        <div class="panel-label">Signal Integrity</div>
        <div class="panel-value" id="sig-val">94.2%</div>
        <div class="panel-sub">carrier: 2.4 GHz</div>
      </div>
      <div class="panel">
        <div class="panel-label">Ghost Index</div>
        <div class="panel-value bad" id="ghost-val">0.771</div>
        <div class="panel-sub">threshold: 0.500</div>
      </div>
      <div class="panel">
        <div class="panel-label">Packet Loss</div>
        <div class="panel-value" id="packet-val">3.1%</div>
        <div class="panel-sub">burst: disabled</div>
      </div>
      <div class="panel">
        <div class="panel-label">Uptime</div>
        <div class="panel-value" id="uptime-val">00:00:00</div>
        <div class="panel-sub">since last reset</div>
      </div>
    </div>
    <div class="log-area" id="log-area"></div>
    <div class="bottom-bar">
      <div class="mode-btns">
        <button class="mode-btn active" onclick="setMode('ghost')">GHOST</button>
        <button class="mode-btn" onclick="setMode('wire')">WIRE</button>
        <button class="mode-btn" onclick="setMode('pulse')">PULSE</button>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </div>
  <script>
    // three.js: fragmenting icosahedron
    const container = document.getElementById('ghost-canvas');
    const W = 520, H = 260;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setClearColor(0x080500, 1);
    container.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
    camera.position.set(0, 0, 3.5);
    // ambient + point lights
    scene.add(new THREE.AmbientLight(0x221100, 2));
    const amberLight = new THREE.PointLight(0xffb000, 4, 8);
    amberLight.position.set(2, 2, 2);
    scene.add(amberLight);
    const redLight = new THREE.PointLight(0xff4400, 3, 6);
    redLight.position.set(-2, -1, 1);
    scene.add(redLight);
    // main icosahedron
    const geo = new THREE.IcosahedronGeometry(1.0, 1);
    const mat = new THREE.MeshPhongMaterial({
      color: 0xffb000,
      emissive: 0x331100,
      wireframe: false,
      transparent: true,
      opacity: 0.85,
      shininess: 120,
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    // wireframe layer
    const wireMat = new THREE.MeshBasicMaterial({ color: 0xffb000, wireframe: true, transparent: true, opacity: 0.18 });
    const wireMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(1.05, 1), wireMat);
    scene.add(wireMesh);
    // fragment particles - store original positions
    const fragGeo = new THREE.IcosahedronGeometry(1.0, 1);
    const positions = fragGeo.attributes.position.array.slice();
    const fragMat = new THREE.PointsMaterial({ color: 0xffb000, size: 0.04, transparent: true, opacity: 0.6 });
    const points = new THREE.Points(fragGeo, fragMat);
    scene.add(points);
    let mode = 'ghost';
    let fragProgress = 0;
    let fragDir = 1;
    let fragOffsets = [];
    for (let i = 0; i < positions.length; i += 3) {
      fragOffsets.push(
        (Math.random() - 0.5) * 3,
        (Math.random() - 0.5) * 3,
        (Math.random() - 0.5) * 3
      );
    }
    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.toLowerCase() === m);
      });
    }
    window.setMode = setMode;
    let startTime = Date.now();
    let frame = 0;
    function animate() {
      requestAnimationFrame(animate);
      frame++;
      const t = Date.now() * 0.001;
      // rotate
      mesh.rotation.x += 0.004;
      mesh.rotation.y += 0.007;
      wireMesh.rotation.x = mesh.rotation.x;
      wireMesh.rotation.y = mesh.rotation.y;
      points.rotation.x = mesh.rotation.x;
      points.rotation.y = mesh.rotation.y;
      // fragment effect
      if (mode === 'ghost') {
        fragProgress += 0.008 * fragDir;
        if (fragProgress >= 1) fragDir = -1;
        if (fragProgress <= 0) fragDir = 1;
      } else if (mode === 'wire') {
        fragProgress = Math.max(0, fragProgress - 0.02);
      } else if (mode === 'pulse') {
        fragProgress = 0.5 + 0.4 * Math.sin(t * 1.5);
      }
      const pos = fragGeo.attributes.position.array;
      for (let i = 0; i < positions.length; i += 3) {
        pos[i]   = positions[i]   + fragOffsets[i]   * fragProgress;
        pos[i+1] = positions[i+1] + fragOffsets[i+1] * fragProgress;
        pos[i+2] = positions[i+2] + fragOffsets[i+2] * fragProgress;
      }
      fragGeo.attributes.position.needsUpdate = true;
      // mode-based visibility
      mesh.visible = mode !== 'wire';
      mat.wireframe = mode === 'wire';
      mat.opacity = mode === 'ghost' ? 0.85 - fragProgress * 0.5 : 0.85;
      fragMat.opacity = 0.3 + fragProgress * 0.5;
      // animate lights
      amberLight.position.x = 2 * Math.sin(t * 0.7);
      amberLight.position.y = 1.5 * Math.cos(t * 0.5);
      redLight.position.x = -2 * Math.cos(t * 0.9);
      redLight.position.z = 2 * Math.sin(t * 0.6);
      // pulse scale
      const s = 1 + 0.04 * Math.sin(t * 2.1);
      mesh.scale.set(s, s, s);
      renderer.render(scene, camera);
    }
    animate();
    // live readouts
    let uptimeSec = 0;
    function pad(n) { return String(n).padStart(2, '0'); }
    const logMessages = [
      ['ok', 'carrier lock established on 2.4GHz'],
      ['msg', 'icosahedron vertices: 12 nodes loaded'],
      ['msg', 'ghost index climbing... monitor advised'],
      ['err', 'anomaly detected in fragment sector 0x3A'],
      ['ok', 'signal recovered — burst filter engaged'],
      ['msg', 'rotation matrix recalculated'],
      ['err', 'packet loss threshold exceeded: 3.1%'],
      ['ok', 'entropy buffer flushed'],
      ['msg', 'node heartbeat nominal'],
      ['err', 'fragment cascade initiated — auto-repair'],
      ['ok', 'geometry reassembly complete'],
      ['msg', 'uplink maintained through interference'],
    ];
    let logIdx = 0;
    function addLog() {
      const logArea = document.getElementById('log-area');
      const entry = logMessages[logIdx % logMessages.length];
      logIdx++;
      const now = new Date();
      const ts = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      const div = document.createElement('div');
      div.className = 'log-line';
      div.innerHTML = `<span class="ts">[${ts}]</span> <span class="${entry[0] === 'err' ? 'err' : entry[0] === 'ok' ? 'ok' : 'msg'}">${entry[1]}</span>`;
      logArea.appendChild(div);
      logArea.scrollTop = logArea.scrollHeight;
      if (logArea.children.length > 30) logArea.removeChild(logArea.firstChild);
    }
    setInterval(() => {
      uptimeSec++;
      const h = Math.floor(uptimeSec / 3600);
      const m = Math.floor((uptimeSec % 3600) / 60);
      const s = uptimeSec % 60;
      document.getElementById('uptime-val').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
      const now = new Date();
      document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      // jitter readouts
      const sig = (90 + Math.random() * 9).toFixed(1);
      document.getElementById('sig-val').textContent = sig + '%';
      const ghost = (0.5 + fragProgress * 0.5 + (Math.random() - 0.5) * 0.1).toFixed(3);
      document.getElementById('ghost-val').textContent = ghost;
      const pkt = (1 + Math.random() * 5).toFixed(1);
      document.getElementById('packet-val').textContent = pkt + '%';
      const entropy = (Math.random()).toFixed(3);
      document.getElementById('entropy-val').textContent = 'ENTROPY: ' + entropy;
    }, 1000);
    setInterval(addLog, 2200);
    addLog();
  </script>
</body>
</html>
