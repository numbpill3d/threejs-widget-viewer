<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAD_STAR.EXE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0000;
      --bg-panel: #110000;
      --bg-deep: #060000;
      --accent: #ff2200;
      --accent-dim: rgba(255,34,0,0.3);
      --accent-glow: rgba(255,34,0,0.07);
      --accent2: #ff8800;
      --accent2-dim: rgba(255,136,0,0.25);
      --text: #ffcccc;
      --text-muted: #5a2020;
      --border: #2a0a0a;
      --white: #ffeeee;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .crt-overlay {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      animation: flicker 10s infinite;
    }
    .crt-overlay::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.8) 100%);
    }
    @keyframes flicker {
      0%,96%,98%,100% { opacity:1; }
      97% { opacity:0.86; }
    }
    .widget {
      width: 510px;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px var(--accent-glow), 0 0 2px var(--border);
      position: relative;
    }
    /* titlebar */
    .titlebar {
      background: var(--accent);
      color: #000;
      font-family: 'VT323', monospace;
      font-size: 17px;
      padding: 3px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.08em;
    }
    .titlebar-btns { display: flex; gap: 4px; }
    .tbtn {
      width: 14px; height: 14px;
      background: #000;
      border: 1px solid #330000;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--accent);
      font-family: 'VT323', monospace;
      transition: background 80ms;
    }
    .tbtn:hover { background: #330000; }
    /* scene */
    #star-canvas {
      position: relative;
      width: 100%;
      height: 250px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    #star-canvas canvas { display: block; }
    /* coordinate overlay */
    .coord-overlay {
      position: absolute;
      top: 8px; left: 10px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      pointer-events: none;
      line-height: 1.6;
    }
    .coord-highlight { color: var(--accent); }
    /* collapse tag top-right */
    .tag-overlay {
      position: absolute;
      top: 8px; right: 10px;
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-dim);
      pointer-events: none;
      letter-spacing: 0.05em;
      text-align: right;
      line-height: 1.3;
    }
    /* mass/radius/temp strip */
    .data-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
    }
    .ds-cell {
      padding: 7px 10px;
      border-right: 1px solid var(--border);
    }
    .ds-cell:last-child { border-right: none; }
    .ds-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .ds-value {
      font-family: 'VT323', monospace;
      font-size: 20px;
      color: var(--accent2);
      text-shadow: 0 0 8px var(--accent2-dim);
      line-height: 1;
    }
    .ds-value.red {
      color: var(--accent);
      text-shadow: 0 0 8px var(--accent-dim);
    }
    /* obituary log */
    .obit-header {
      padding: 5px 12px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
    }
    .obit-header .live-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.3; transform:scale(0.6); }
    }
    .obit-log {
      height: 88px;
      overflow-y: scroll;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      padding: 6px 12px;
    }
    .obit-log::-webkit-scrollbar { width: 5px; }
    .obit-log::-webkit-scrollbar-track { background: var(--bg-deep); }
    .obit-log::-webkit-scrollbar-thumb { background: var(--accent-dim); border: 1px solid var(--accent); }
    .obit-entry {
      font-size: 11px;
      line-height: 1.6;
      color: var(--text-muted);
      border-left: 2px solid transparent;
      padding-left: 6px;
      transition: border-color 200ms;
    }
    .obit-entry:hover { border-left-color: var(--accent); color: var(--text); }
    .obit-entry .et { color: var(--text-muted); opacity: 0.4; }
    .obit-entry .em { color: var(--text); }
    .obit-entry .ec { color: var(--accent); }
    /* bottom */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: var(--bg-panel);
    }
    .btn-row { display: flex; gap: 5px; }
    .star-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      cursor: pointer;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      transition: color 100ms, border-color 100ms, box-shadow 100ms;
    }
    .star-btn:hover, .star-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 6px var(--accent-dim);
    }
    .bottom-right {
      text-align: right;
    }
    .bottom-clock {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--accent-dim);
    }
    .bottom-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="widget">
    <div class="titlebar">
      <span>DEAD_STAR.EXE // STELLAR COLLAPSE</span>
      <div class="titlebar-btns">
        <div class="tbtn">_</div>
        <div class="tbtn">[]</div>
        <div class="tbtn">X</div>
      </div>
    </div>
    <div id="star-canvas">
      <div class="coord-overlay">
        RA: <span class="coord-highlight" id="ra-val">05h 34m 32s</span><br>
        DEC: <span class="coord-highlight" id="dec-val">+22&deg; 00' 52"</span><br>
        DIST: <span class="coord-highlight" id="dist-val">6,523 ly</span>
      </div>
      <div class="tag-overlay" id="star-tag">
        TYPE: WR<br>
        STAGE: IV<br>
        <span id="collapse-pct">COL: 87%</span>
      </div>
    </div>
    <div class="data-strip">
      <div class="ds-cell">
        <div class="ds-label">Mass</div>
        <div class="ds-value red" id="mass-val">18.4M&odot;</div>
      </div>
      <div class="ds-cell">
        <div class="ds-label">Radius</div>
        <div class="ds-value" id="radius-val">4.2R&odot;</div>
      </div>
      <div class="ds-cell">
        <div class="ds-label">Temp</div>
        <div class="ds-value" id="temp-val">47kK</div>
      </div>
      <div class="ds-cell">
        <div class="ds-label">Lum</div>
        <div class="ds-value red" id="lum-val">10^5.6</div>
      </div>
    </div>
    <div class="obit-header">
      <div><span class="live-dot"></span>COLLAPSE EVENTS</div>
      <div id="event-count">0 events</div>
    </div>
    <div class="obit-log" id="obit-log"></div>
    <div class="bottom">
      <div class="btn-row">
        <button class="star-btn active" id="btn-collapse" onclick="setStarMode('collapse',this)">COLLAPSE</button>
        <button class="star-btn" id="btn-nova" onclick="setStarMode('nova',this)">NOVA</button>
        <button class="star-btn" id="btn-remnant" onclick="setStarMode('remnant',this)">REMNANT</button>
      </div>
      <div class="bottom-right">
        <div class="bottom-label">ELAPSED</div>
        <div class="bottom-clock" id="star-clock">00:00:00</div>
      </div>
    </div>
  </div>
  <script>
    // three.js: fragmented icosahedron frozen mid-explosion
    const container = document.getElementById('star-canvas');
    const W = 510, H = 250;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setClearColor(0x060000, 1);
    container.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(58, W / H, 0.1, 100);
    camera.position.set(0, 0, 4);
    scene.add(new THREE.AmbientLight(0x110000, 3));
    const redLight = new THREE.PointLight(0xff2200, 6, 10);
    redLight.position.set(1, 1, 2);
    scene.add(redLight);
    const orangeLight = new THREE.PointLight(0xff8800, 4, 8);
    orangeLight.position.set(-2, -1, 1);
    scene.add(orangeLight);
    // generate fragment shards from icosahedron faces
    const baseGeo = new THREE.IcosahedronGeometry(1.0, 1);
    const shards = [];
    const shardGroup = new THREE.Group();
    scene.add(shardGroup);
    // create individual triangle shards
    const pos = baseGeo.attributes.position;
    const count = pos.count;
    for (let i = 0; i < count; i += 3) {
      const v0 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
      const v1 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1));
      const v2 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2));
      const center = new THREE.Vector3().addVectors(v0, v1).add(v2).divideScalar(3);
      const geo = new THREE.BufferGeometry();
      // offset verts relative to center
      const verts = new Float32Array([
        v0.x - center.x, v0.y - center.y, v0.z - center.z,
        v1.x - center.x, v1.y - center.y, v1.z - center.z,
        v2.x - center.x, v2.y - center.y, v2.z - center.z,
      ]);
      geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      geo.computeVertexNormals();
      const shade = 0.5 + Math.random() * 0.5;
      const col = new THREE.Color(shade, shade * 0.2, 0);
      const mat = new THREE.MeshPhongMaterial({
        color: col,
        emissive: new THREE.Color(shade * 0.3, 0, 0),
        transparent: true,
        opacity: 0.8 + Math.random() * 0.2,
        shininess: 80,
        side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(center);
      // each shard has a drift vector (frozen mid-explosion)
      const drift = center.clone().normalize().multiplyScalar(0.3 + Math.random() * 0.9);
      const spin = new THREE.Vector3(
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04
      );
      shards.push({ mesh, origin: center.clone(), drift, spin, phase: Math.random() * Math.PI * 2 });
      shardGroup.add(mesh);
    }
    // glowing core point
    const coreMat = new THREE.PointsMaterial({ color: 0xff4400, size: 0.12, transparent: true, opacity: 0.9 });
    const coreGeo = new THREE.BufferGeometry();
    coreGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0]), 3));
    const core = new THREE.Points(coreGeo, coreMat);
    scene.add(core);
    // particle debris
    const debrisCount = 200;
    const debrisPositions = new Float32Array(debrisCount * 3);
    const debrisVelocities = [];
    for (let i = 0; i < debrisCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 0.5 + Math.random() * 2;
      debrisPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
      debrisPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      debrisPositions[i*3+2] = r * Math.cos(phi);
      debrisVelocities.push(new THREE.Vector3(
        (Math.random() - 0.5) * 0.003,
        (Math.random() - 0.5) * 0.003,
        (Math.random() - 0.5) * 0.003
      ));
    }
    const debrisGeo = new THREE.BufferGeometry();
    debrisGeo.setAttribute('position', new THREE.BufferAttribute(debrisPositions, 3));
    const debrisMat = new THREE.PointsMaterial({ color: 0xff6600, size: 0.025, transparent: true, opacity: 0.5 });
    const debris = new THREE.Points(debrisGeo, debrisMat);
    scene.add(debris);
    let starMode = 'collapse';
    window.setStarMode = function(mode, btn) {
      starMode = mode;
      document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    let elapsed = 0;
    function animate() {
      requestAnimationFrame(animate);
      const t = Date.now() * 0.001;
      elapsed++;
      let explodeAmt = 0;
      if (starMode === 'collapse') explodeAmt = 0.4 + 0.2 * Math.sin(t * 0.5);
      else if (starMode === 'nova') explodeAmt = 0.85 + 0.1 * Math.sin(t * 2);
      else explodeAmt = 0.15 + 0.05 * Math.sin(t * 0.3);
      // animate shards
      shards.forEach(s => {
        const pulse = Math.sin(t * 1.2 + s.phase) * 0.04;
        s.mesh.position.lerpVectors(s.origin, s.origin.clone().add(s.drift), explodeAmt + pulse);
        s.mesh.rotation.x += s.spin.x;
        s.mesh.rotation.y += s.spin.y;
        s.mesh.rotation.z += s.spin.z;
        s.mesh.material.opacity = starMode === 'remnant' ? 0.3 + Math.random() * 0.1 : 0.7 + Math.random() * 0.3;
      });
      shardGroup.rotation.y += 0.004;
      shardGroup.rotation.x += 0.002;
      // debris
      const dp = debrisGeo.attributes.position.array;
      for (let i = 0; i < debrisCount; i++) {
        dp[i*3]   += debrisVelocities[i].x;
        dp[i*3+1] += debrisVelocities[i].y;
        dp[i*3+2] += debrisVelocities[i].z;
        const dist = Math.sqrt(dp[i*3]**2 + dp[i*3+1]**2 + dp[i*3+2]**2);
        if (dist > 3.5) {
          dp[i*3] = (Math.random()-0.5)*0.3;
          dp[i*3+1] = (Math.random()-0.5)*0.3;
          dp[i*3+2] = (Math.random()-0.5)*0.3;
        }
      }
      debrisGeo.attributes.position.needsUpdate = true;
      // lights
      redLight.position.x = 2 * Math.sin(t * 0.7);
      redLight.position.y = 1.5 * Math.cos(t * 0.5);
      orangeLight.position.x = -2 * Math.cos(t * 0.9);
      orangeLight.intensity = starMode === 'nova' ? 6 + Math.sin(t * 3) * 2 : 4;
      // core glow
      coreMat.size = starMode === 'nova' ? 0.25 + Math.sin(t*4) * 0.1 : 0.08;
      renderer.render(scene, camera);
    }
    animate();
    // event log
    const collapseEvents = [
      ['ec', 'iron core collapse initiated'],
      ['em', 'neutrino burst detected: 3.2e53 erg'],
      ['ec', 'shock wave stalled at 200km radius'],
      ['em', 'convective overturn establishing'],
      ['ec', 'neutron star formation confirmed'],
      ['em', 'envelope ejection velocity: 10,000 km/s'],
      ['ec', 'r-process nucleosynthesis active'],
      ['em', 'Fe-56 peak at core — no further fusion'],
      ['ec', 'gravity wins at t+0.25s'],
      ['em', 'density: 2.3 x nuclear saturation'],
      ['ec', 'bounce shock generated at r=50km'],
      ['em', 'explosion energy: 1 foe (10^51 erg)'],
    ];
    let evtCount = 0;
    let logCount = 0;
    function addEvent() {
      const log = document.getElementById('obit-log');
      const entry = collapseEvents[evtCount % collapseEvents.length];
      evtCount++;
      logCount++;
      document.getElementById('event-count').textContent = logCount + ' events';
      const now = new Date();
      const ts = `T+${String(logCount).padStart(3,'0')}s`;
      const div = document.createElement('div');
      div.className = 'obit-entry';
      div.innerHTML = `<span class="et">[${ts}]</span> <span class="${entry[0]}">${entry[1]}</span>`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      if (log.children.length > 40) log.removeChild(log.firstChild);
    }
    function pad(n) { return String(n).padStart(2,'0'); }
    let upSec = 0;
    setInterval(() => {
      upSec++;
      const h = Math.floor(upSec / 3600);
      const m = Math.floor((upSec % 3600) / 60);
      const s = upSec % 60;
      document.getElementById('star-clock').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
      // jitter data
      document.getElementById('mass-val').textContent = (16 + Math.random()*4).toFixed(1) + 'M&#x2299;';
      document.getElementById('radius-val').textContent = (3 + Math.random()*2).toFixed(1) + 'R&#x2299;';
      document.getElementById('temp-val').textContent = Math.floor(40 + Math.random()*15) + 'kK';
      document.getElementById('collapse-pct').textContent = 'COL: ' + Math.floor(80 + Math.random()*19) + '%';
      // coordinates drift
      const raH = 5, raM = 34, raS = Math.floor(Math.random()*60);
      document.getElementById('ra-val').textContent = `${raH}h ${raM}m ${pad(raS)}s`;
    }, 1000);
    setInterval(addEvent, 2800);
    addEvent();
  </script>
</body>
</html>
