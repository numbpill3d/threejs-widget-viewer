<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID_RITE.EXE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020d0d;
      --bg-panel: #041414;
      --bg-deep: #010808;
      --accent: #00e5cc;
      --accent-dim: rgba(0,229,204,0.3);
      --accent-glow: rgba(0,229,204,0.08);
      --accent2: #9900ff;
      --accent2-dim: rgba(153,0,255,0.25);
      --text: #b0fff8;
      --text-muted: #2a6e68;
      --border: #082020;
      --warn: #ff6600;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .crt-overlay {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.09) 2px, rgba(0,0,0,0.09) 4px);
      animation: flicker 8s infinite;
    }
    .crt-overlay::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    }
    @keyframes flicker {
      0%,97%,99%,100% { opacity: 1; }
      98% { opacity: 0.88; }
    }
    .widget {
      width: 500px;
      border: 1px solid var(--border);
      box-shadow: 0 0 50px var(--accent-glow), 0 0 100px rgba(153,0,255,0.04);
      position: relative;
    }
    /* titlebar */
    .titlebar {
      background: linear-gradient(90deg, var(--accent2) 0%, #006060 100%);
      color: var(--text);
      font-family: 'VT323', monospace;
      font-size: 17px;
      padding: 3px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.1em;
    }
    .titlebar-btns { display: flex; gap: 4px; }
    .tbtn {
      width: 14px; height: 14px;
      background: var(--bg-deep);
      border: 1px solid var(--text-muted);
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--accent);
      font-family: 'VT323', monospace;
      transition: background 80ms;
    }
    .tbtn:hover { background: var(--accent2); color: var(--text); }
    /* scene */
    #void-canvas {
      position: relative;
      width: 100%;
      height: 240px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    #void-canvas canvas { display: block; }
    /* floating ASCII corruption overlay */
    .ascii-drift {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      font-family: 'VT323', monospace;
      font-size: 12px;
      color: var(--accent);
      opacity: 0.08;
      overflow: hidden;
      line-height: 1.1;
      white-space: pre;
      padding: 4px;
      word-break: break-all;
    }
    /* signal noise bar */
    .noise-bar {
      height: 36px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    #noise-canvas { display: block; width: 100%; height: 100%; }
    /* system grid */
    .sys-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .sys-cell {
      padding: 8px 10px;
      border-right: 1px solid var(--border);
    }
    .sys-cell:last-child { border-right: none; }
    .sys-label {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .sys-value {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-dim);
      line-height: 1;
    }
    .sys-value.purple { color: #cc77ff; text-shadow: 0 0 10px var(--accent2-dim); }
    .sys-value.warn { color: var(--warn); text-shadow: 0 0 10px rgba(255,102,0,0.3); animation: blink 1.8s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .sys-bar {
      height: 3px;
      background: var(--border);
      margin-top: 4px;
      position: relative;
    }
    .sys-bar-fill {
      height: 100%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-dim);
      transition: width 800ms ease;
    }
    .sys-bar-fill.purple { background: #9900ff; box-shadow: 0 0 6px var(--accent2-dim); }
    /* glitch readout strip */
    .glitch-strip {
      padding: 6px 12px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 14px;
      overflow: hidden;
    }
    .glitch-item { display: flex; gap: 6px; }
    .glitch-key { color: var(--text-muted); }
    .glitch-val { color: var(--text); }
    .glitch-val.corrupt {
      color: var(--accent2);
      animation: corrupt 3s infinite;
    }
    @keyframes corrupt {
      0%,90%,100% { opacity: 1; letter-spacing: normal; }
      92% { opacity: 0.4; letter-spacing: 0.2em; }
      95% { opacity: 0.9; }
    }
    /* bottom controls */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: var(--bg-panel);
    }
    .btn-row { display: flex; gap: 5px; }
    .ctrl-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 3px 9px;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 100ms, border-color 100ms, box-shadow 100ms;
    }
    .ctrl-btn:hover, .ctrl-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-dim);
    }
    .bottom-clock {
      font-family: 'VT323', monospace;
      font-size: 22px;
      color: var(--accent-dim);
      letter-spacing: 0.04em;
      text-align: right;
    }
    .bottom-clock span {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div class="widget">
    <div class="titlebar">
      <span>VOID_RITE.EXE // PROCESS MONITOR</span>
      <div class="titlebar-btns">
        <div class="tbtn">_</div>
        <div class="tbtn">[]</div>
        <div class="tbtn">X</div>
      </div>
    </div>
    <div id="void-canvas">
      <div class="ascii-drift" id="ascii-drift"></div>
    </div>
    <div class="noise-bar">
      <canvas id="noise-canvas"></canvas>
    </div>
    <div class="sys-grid">
      <div class="sys-cell">
        <div class="sys-label">CPU</div>
        <div class="sys-value" id="cpu-val">62%</div>
        <div class="sys-bar"><div class="sys-bar-fill" id="cpu-bar" style="width:62%"></div></div>
      </div>
      <div class="sys-cell">
        <div class="sys-label">Memory</div>
        <div class="sys-value purple" id="mem-val">4.1GB</div>
        <div class="sys-bar"><div class="sys-bar-fill purple" id="mem-bar" style="width:51%"></div></div>
      </div>
      <div class="sys-cell">
        <div class="sys-label">Void Index</div>
        <div class="sys-value warn" id="void-val">CRITICAL</div>
        <div class="sys-bar"><div class="sys-bar-fill" id="void-bar" style="width:89%;background:var(--warn);box-shadow:0 0 6px rgba(255,102,0,0.3)"></div></div>
      </div>
    </div>
    <div class="glitch-strip">
      <div class="glitch-item"><span class="glitch-key">PID:</span><span class="glitch-val">0x4A2F</span></div>
      <div class="glitch-item"><span class="glitch-key">THREAD:</span><span class="glitch-val corrupt" id="thread-val">7</span></div>
      <div class="glitch-item"><span class="glitch-key">NODE:</span><span class="glitch-val">lain_v3.local</span></div>
      <div class="glitch-item"><span class="glitch-key">DEPTH:</span><span class="glitch-val corrupt" id="depth-val">INF</span></div>
    </div>
    <div class="bottom">
      <div class="btn-row">
        <button class="ctrl-btn active" onclick="cycleShape(this)">OCT</button>
        <button class="ctrl-btn" onclick="cycleShape(this)">ICOS</button>
        <button class="ctrl-btn" onclick="cycleShape(this)">TETRA</button>
      </div>
      <div class="bottom-clock">
        <div id="void-clock">--:--:--</div>
        <span id="void-date">--/--/----</span>
      </div>
    </div>
  </div>
  <script>
    // three.js: crystalline octahedron with inner wire lattice
    const container = document.getElementById('void-canvas');
    const W = 500, H = 240;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setClearColor(0x010808, 1);
    container.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
    camera.position.set(0, 0, 3.8);
    scene.add(new THREE.AmbientLight(0x003333, 3));
    const tealLight = new THREE.PointLight(0x00e5cc, 5, 10);
    tealLight.position.set(2, 1, 2);
    scene.add(tealLight);
    const purpleLight = new THREE.PointLight(0x9900ff, 4, 8);
    purpleLight.position.set(-2, -1, 1);
    scene.add(purpleLight);
    const shapes = [
      new THREE.OctahedronGeometry(1.0, 0),
      new THREE.IcosahedronGeometry(1.0, 0),
      new THREE.TetrahedronGeometry(1.0, 0),
    ];
    const shapeIdx = { OCT: 0, ICOS: 1, TETRA: 2 };
    let currentShape = 0;
    const mat = new THREE.MeshPhongMaterial({
      color: 0x00e5cc,
      emissive: 0x002222,
      transparent: true,
      opacity: 0.7,
      shininess: 200,
    });
    const mesh = new THREE.Mesh(shapes[0], mat);
    scene.add(mesh);
    // inner crystal
    const innerMat = new THREE.MeshPhongMaterial({
      color: 0x9900ff,
      emissive: 0x110022,
      transparent: true,
      opacity: 0.4,
      shininess: 300,
    });
    const innerMesh = new THREE.Mesh(new THREE.OctahedronGeometry(0.55, 0), innerMat);
    scene.add(innerMesh);
    // wire shell
    const wireMat = new THREE.MeshBasicMaterial({ color: 0x00e5cc, wireframe: true, transparent: true, opacity: 0.12 });
    const wireMesh = new THREE.Mesh(new THREE.OctahedronGeometry(1.08, 0), wireMat);
    scene.add(wireMesh);
    // orbit line rings
    const ringGeo = new THREE.RingGeometry(1.35, 1.37, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00e5cc, side: THREE.DoubleSide, transparent: true, opacity: 0.15 });
    const ring1 = new THREE.Mesh(ringGeo, ringMat);
    ring1.rotation.x = Math.PI / 2;
    scene.add(ring1);
    const ring2 = new THREE.Mesh(ringGeo, ringMat.clone());
    ring2.rotation.y = Math.PI / 4;
    scene.add(ring2);
    function cycleShape(btn) {
      document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const key = btn.textContent.trim();
      const idx = shapeIdx[key] ?? 0;
      mesh.geometry = shapes[idx];
    }
    window.cycleShape = cycleShape;
    function animate() {
      requestAnimationFrame(animate);
      const t = Date.now() * 0.001;
      mesh.rotation.x += 0.005;
      mesh.rotation.y += 0.009;
      innerMesh.rotation.x -= 0.007;
      innerMesh.rotation.z += 0.005;
      wireMesh.rotation.x = mesh.rotation.x * 0.5;
      wireMesh.rotation.y = mesh.rotation.y * 0.5;
      ring1.rotation.z += 0.003;
      ring2.rotation.x += 0.004;
      // pulse
      const p = 1 + 0.05 * Math.sin(t * 1.8);
      mesh.scale.set(p, p, p);
      tealLight.position.x = 2.5 * Math.sin(t * 0.6);
      tealLight.position.y = 1.5 * Math.cos(t * 0.4);
      purpleLight.position.x = -2 * Math.cos(t * 0.8);
      purpleLight.position.z = 2 * Math.sin(t * 0.5);
      // color shift
      mat.emissive.setHex(Math.random() > 0.99 ? 0x006655 : 0x002222);
      renderer.render(scene, camera);
    }
    animate();
    // noise bar canvas
    const noiseCanvas = document.getElementById('noise-canvas');
    noiseCanvas.width = 500;
    noiseCanvas.height = 36;
    const nctx = noiseCanvas.getContext('2d');
    let noiseOffset = 0;
    function drawNoise() {
      requestAnimationFrame(drawNoise);
      nctx.clearRect(0, 0, 500, 36);
      nctx.fillStyle = '#010808';
      nctx.fillRect(0, 0, 500, 36);
      // signal line
      nctx.beginPath();
      nctx.strokeStyle = 'rgba(0,229,204,0.5)';
      nctx.lineWidth = 1.5;
      noiseOffset += 2;
      for (let x = 0; x < 500; x++) {
        const y = 18 + Math.sin((x + noiseOffset) * 0.05) * 6
                     + Math.sin((x + noiseOffset) * 0.13) * 3
                     + (Math.random() - 0.5) * 2.5;
        x === 0 ? nctx.moveTo(x, y) : nctx.lineTo(x, y);
      }
      nctx.stroke();
      // noise spikes
      for (let i = 0; i < 3; i++) {
        const sx = Math.random() * 500;
        nctx.beginPath();
        nctx.strokeStyle = 'rgba(153,0,255,0.4)';
        nctx.lineWidth = 1;
        nctx.moveTo(sx, 0);
        nctx.lineTo(sx, 36);
        nctx.stroke();
      }
    }
    drawNoise();
    // ASCII drift background
    const ascii = '01アイウエオカキクケコ∂∇∅∞≠≈⊕⊗⊞⊟▓▒░█▐▌▄▀ ';
    function fillAscii() {
      const el = document.getElementById('ascii-drift');
      let str = '';
      for (let i = 0; i < 60 * 20; i++) {
        str += ascii[Math.floor(Math.random() * ascii.length)];
        if (i % 60 === 59) str += '\n';
      }
      el.textContent = str;
    }
    fillAscii();
    setInterval(fillAscii, 800);
    // live metrics
    function pad(n) { return String(n).padStart(2, '0'); }
    setInterval(() => {
      const cpu = Math.floor(45 + Math.random() * 40);
      document.getElementById('cpu-val').textContent = cpu + '%';
      document.getElementById('cpu-bar').style.width = cpu + '%';
      const mem = (3.2 + Math.random() * 2.4).toFixed(1);
      document.getElementById('mem-val').textContent = mem + 'GB';
      document.getElementById('mem-bar').style.width = Math.min(95, (parseFloat(mem)/8)*100) + '%';
      const threads = [3,5,7,9,11,'??'][Math.floor(Math.random()*6)];
      document.getElementById('thread-val').textContent = threads;
      const depths = ['INF','∞','DEEP','NULL','N/A'][Math.floor(Math.random()*5)];
      document.getElementById('depth-val').textContent = depths;
      const now = new Date();
      document.getElementById('void-clock').textContent =
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById('void-date').textContent =
        `${pad(now.getMonth()+1)}/${pad(now.getDate())}/${now.getFullYear()}`;
    }, 1000);
  </script>
</body>
</html>
