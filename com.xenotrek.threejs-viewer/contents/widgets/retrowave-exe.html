    /* Windows 98 inspired UI */
    :root {
      --win98-gray: #c0c0c0;
      --win98-dark: #808080;
      --win98-darker: #404040;
      --win98-light: #ffffff;
      --win98-blue: #000080;
      --win98-cyan: #008080;
      --retrowave-pink: #ff00ff;
      --retrowave-blue: #00ffff;
      --retrowave-purple: #9900ff;
      --retrowave-dark: #120458;
      --retrowave-sunset: #fc3f9e;
    }
    body, html {
      margin: 0;
      padding: 0;
      font-family: "MS Sans Serif", Arial, sans-serif;
      overflow: hidden;
      background-color: black;
    }
    #container {
      width: 250px;
      height: 500px;
      position: relative;
      overflow: hidden;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
      background-color: var(--win98-gray);
      border: 2px solid var(--win98-dark);
      border-top-color: var(--win98-light);
      border-left-color: var(--win98-light);
    }
    #title-bar {
      background: linear-gradient(90deg, var(--win98-blue), var(--retrowave-purple));
      color: white;
      padding: 3px 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 12px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
    }
    #title-buttons {
      display: flex;
    }
    .title-button {
      width: 16px;
      height: 14px;
      margin-left: 2px;
      background-color: var(--win98-gray);
      border: 1px solid;
      border-top-color: var(--win98-light);
      border-left-color: var(--win98-light);
      border-right-color: var(--win98-darker);
      border-bottom-color: var(--win98-darker);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 9px;
      cursor: pointer;
    }
    #controls {
      background-color: var(--win98-gray);
      padding: 5px;
      display: flex;
      flex-direction: column;
    }
    .control-group {
      margin-bottom: 5px;
      border: 1px solid;
      border-top-color: var(--win98-darker);
      border-left-color: var(--win98-darker);
      border-right-color: var(--win98-light);
      border-bottom-color: var(--win98-light);
      padding: 5px;
    }
    .control-label {
      font-size: 11px;
      margin-bottom: 3px;
    }
    .win98-button {
      background-color: var(--win98-gray);
      border: 1px solid;
      border-top-color: var(--win98-light);
      border-left-color: var(--win98-light);
      border-right-color: var(--win98-darker);
      border-bottom-color: var(--win98-darker);
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      margin-top: 3px;
    }
    .win98-button:active {
      border-top-color: var(--win98-darker);
      border-left-color: var(--win98-darker);
      border-right-color: var(--win98-light);
      border-bottom-color: var(--win98-light);
    }
    .win98-slider {
      width: 100%;
      height: 10px;
      -webkit-appearance: none;
      background-color: var(--win98-light);
      outline: none;
      border: 1px solid var(--win98-darker);
    }
    .win98-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 20px;
      background: var(--win98-gray);
      border: 1px solid;
      border-top-color: var(--win98-light);
      border-left-color: var(--win98-light);
      border-right-color: var(--win98-darker);
      border-bottom-color: var(--win98-darker);
    }
    .win98-dropdown {
      width: 100%;
      background-color: white;
      border: 1px solid;
      border-top-color: var(--win98-darker);
      border-left-color: var(--win98-darker);
      border-right-color: var(--win98-light);
      border-bottom-color: var(--win98-light);
      font-size: 11px;
      padding: 1px;
    }
    #status-bar {
      font-size: 11px;
      padding: 3px 5px;
      background-color: var(--win98-gray);
      border-top: 1px solid var(--win98-dark);
      position: absolute;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
    }
    #scene-container {
      width: 100%;
      height: 230px;
      background: black;
      position: relative;
    }
    .ascii-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: rgba(0, 255, 255, 0.2);
      font-family: monospace;
      font-size: 8px;
      overflow: hidden;
      pointer-events: none;
      text-shadow: 0 0 5px var(--retrowave-pink);
      z-index: 10;
      mix-blend-mode: screen;
    }
    .grid-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(0deg, rgba(255, 0, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      z-index: 5;
      pointer-events: none;
    }
    .grid-horizon {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: linear-gradient(0deg,
        var(--retrowave-sunset) 0%,
        rgba(136, 0, 255, 0.5) 30%,
        rgba(0, 0, 0, 0) 100%);
      z-index: 3;
      pointer-events: none;
      opacity: 0.3;
    }
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.03) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      background-size: 100% 4px;
      z-index: 15;
      pointer-events: none;
      opacity: 0.3;
    }
    #fps-counter {
      position: absolute;
      bottom: 5px;
      right: 5px;
      color: var(--retrowave-pink);
      font-size: 10px;
      z-index: 20;
      font-family: monospace;
      text-shadow: 0 0 3px rgba(255, 0, 255, 0.7);
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="title-bar">
      <div>RETROWAVE.EXE</div>
      <div id="title-buttons">
        <div class="title-button" id="min-button">_</div>
        <div class="title-button" id="max-button">□</div>
        <div class="title-button" id="close-button">×</div>
      </div>
    </div>
    <div id="scene-container">
      <div class="grid-horizon"></div>
      <div class="grid-lines"></div>
      <div class="scan-line"></div>
      <div class="ascii-overlay" id="ascii-art"></div>
      <div id="fps-counter">60 FPS</div>
    </div>
    <div id="controls">
      <div class="control-group">
        <div class="control-label">OBJECT:</div>
        <select class="win98-dropdown" id="shape-select">
          <option value="gun">HANDGUN</option>
          <option value="server">SERVER</option>
          <option value="emp">EMP DEVICE</option>
          <option value="lockpick">LOCKPICK</option>
        </select>
      </div>
      <div class="control-group">
        <div class="control-label">ROTATION SPEED:</div>
        <input type="range" min="0" max="10" value="5" class="win98-slider" id="speed-slider">
      </div>
      <div class="control-group">
        <div class="control-label">GRID MODE:</div>
        <select class="win98-dropdown" id="grid-mode">
          <option value="wireframe">WIREFRAME</option>
          <option value="solid">SOLID</option>
          <option value="points">POINTS</option>
        </select>
      </div>
      <div class="control-group">
        <div class="control-label">EFFECTS:</div>
        <button class="win98-button" id="glitch-button">GLITCH</button>
        <button class="win98-button" id="zoom-button">ZOOM</button>
        <button class="win98-button" id="scan-button">SCAN</button>
      </div>

      <div class="control-group">
        <div class="control-label">LAYER DEPTH:</div>
        <input type="range" min="0" max="10" value="5" class="win98-slider" id="depth-slider">
      </div>
    </div>
    <div id="status-bar">
      <div>Ready</div>
      <div id="time-display">00:00:00</div>
    </div>
  </div>
  <script>
    // ASCII art generation with tech and hacker-themed characters
    function generateAsciiArt() {
      const techChars = 'xX0@#*+=:-.01>!|/\\[]{}$%&<>?;:~^`';
      let ascii = '';
      const rows = 30;
      const cols = 40;

      // Technical terms to randomly insert
      const techTerms = [
        'HACK', 'SYS', 'ROOT', 'NET', 'PWN',
        'EXE', 'CMD', 'GET', 'LOG', 'KEY',
        'SSH', 'GPU', 'CPU', 'RAM', 'EOF',
        'HEX', 'BIN', 'ASM', 'SQL', 'DNS',
        'DOS', 'WIN', 'USB', 'FTP', 'VPN'
      ];

      for (let i = 0; i < rows; i++) {
        // Random chance to insert a tech term instead of random chars
        if (Math.random() < 0.2) {
          const term = techTerms[Math.floor(Math.random() * techTerms.length)];
          const padding = ' '.repeat(Math.floor(Math.random() * (cols - term.length)));
          ascii += padding + term + ' '.repeat(cols - padding.length - term.length) + '\n';
        } else {
          for (let j = 0; j < cols; j++) {
            ascii += techChars[Math.floor(Math.random() * techChars.length)];
          }
          ascii += '\n';
        }
      }

      document.getElementById('ascii-art').textContent = ascii;
    }

    generateAsciiArt();
    setInterval(generateAsciiArt, 5000);

    // Time display
    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('time-display').textContent = `${hours}:${minutes}:${seconds}`;
    }

    setInterval(updateTime, 1000);
    updateTime();

    // Window buttons
    document.getElementById('close-button').addEventListener('click', () => {
      alert('SYSTEM MESSAGE: Cannot close critical process.');
    });

    document.getElementById('min-button').addEventListener('click', () => {
      document.getElementById('scene-container').style.display =
        document.getElementById('scene-container').style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('max-button').addEventListener('click', () => {
      alert('ERROR: Maximum window size reached.');
    });

    // Three.js implementation
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 250/230, 0.1, 1000);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setSize(250, 230);
    document.getElementById('scene-container').appendChild(renderer.domElement);

    // Add lights
    // Scene fog for depth
    scene.fog = new THREE.Fog(0x120458, 2, 8);
    // Background
    renderer.setClearColor(0x000000);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
    directionalLight.position.set(1, 1, 1);
    scene.add(directionalLight);

    // Add point lights for retrowave effect
    const pinkLight = new THREE.PointLight(0xff00ff, 1, 100);
    pinkLight.position.set(2, 2, 2);
    scene.add(pinkLight);

    const blueLight = new THREE.PointLight(0x00ffff, 1, 100);
    blueLight.position.set(-2, -1, -1);
    scene.add(blueLight);

    // Add extra retrowave sun light
    const sunLight = new THREE.PointLight(0xff3f9e, 0.8, 100);
    sunLight.position.set(0, -2, -5);
    scene.add(sunLight);

    // Add floor grid
    const gridHelper = new THREE.GridHelper(20, 40);
    gridHelper.position.y = -1.5;
    gridHelper.material.opacity = 0.2;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Add background sun sphere
    const sunGeometry = new THREE.SphereGeometry(2, 32, 32);
    const sunMaterial = new THREE.MeshBasicMaterial({
      color: 0xff3f9e,
      transparent: true,
      opacity: 0.4
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    sun.position.set(0, -1, -8);
    scene.add(sun);

    // Create materials
    const wireframeMaterial = new THREE.MeshBasicMaterial({
      color: 0x00ffff,
      wireframe: true
    });

    const solidMaterial = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      emissive: 0x222222,
      specular: 0xff00ff,
      shininess: 30,
      flatShading: true
    });

    const pointsMaterial = new THREE.PointsMaterial({
      color: 0xff00ff,
      size: 0.05,
      sizeAttenuation: true
    });

    // Base geometries for fallback
    const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
    const sphereGeometry = new THREE.SphereGeometry(0.7, 16, 16);
    const torusGeometry = new THREE.TorusGeometry(0.5, 0.2, 16, 50);
    const pyramidGeometry = new THREE.TetrahedronGeometry(0.8);

    // Create more complex 3D models
    // Gun model
    function createGunModel() {
      const gunGroup = new THREE.Group();

      // Gun barrel
      const barrel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, 0.7, 8),
        wireframeMaterial
      );
      barrel.rotation.x = Math.PI / 2;
      barrel.position.z = 0.35;

      // Gun handle
      const handle = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 0.3, 0.2),
        wireframeMaterial
      );
      handle.position.y = -0.2;

      // Gun body
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.2, 0.2, 0.4),
        wireframeMaterial
      );
      body.position.z = 0.1;

      // Trigger
      const trigger = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.1, 0.05),
        wireframeMaterial
      );
      trigger.position.set(0, -0.05, 0);

      // Sight
      const sight = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.05, 0.05),
        wireframeMaterial
      );
      sight.position.set(0, 0.15, 0.05);

      gunGroup.add(barrel, handle, body, trigger, sight);
      return gunGroup;
    }

    // Server model
    function createServerModel() {
      const serverGroup = new THREE.Group();

      // Server chassis
      const chassis = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.3, 0.6),
        wireframeMaterial
      );

      // Server front panel with details
      for (let i = 0; i < 4; i++) {
        const panel = new THREE.Mesh(
          new THREE.BoxGeometry(0.15, 0.05, 0.01),
          wireframeMaterial
        );
        panel.position.set(0, -0.1 + i * 0.07, 0.31);
        serverGroup.add(panel);

        // Add small LEDs
        const led = new THREE.Mesh(
          new THREE.SphereGeometry(0.01, 4, 4),
          new THREE.MeshBasicMaterial({ color: 0x00ff00 })
        );
        led.position.set(-0.3, -0.1 + i * 0.07, 0.31);
        serverGroup.add(led);
      }

      // Cooling vents
      for (let i = 0; i < 6; i++) {
        const vent = new THREE.Mesh(
          new THREE.BoxGeometry(0.05, 0.02, 0.1),
          wireframeMaterial
        );
        vent.position.set(0.3, -0.1 + i * 0.05, 0.31);
        serverGroup.add(vent);
      }

      serverGroup.add(chassis);
      return serverGroup;
    }

    // EMP device model
    function createEMPModel() {
      const empGroup = new THREE.Group();

      // Main body (cylindrical casing)
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16),
        wireframeMaterial
      );

      // Circuit board on top
      const circuit = new THREE.Mesh(
        new THREE.CircleGeometry(0.25, 16),
        wireframeMaterial
      );
      circuit.rotation.x = -Math.PI / 2;
      circuit.position.y = 0.11;

      // Add small electronic components
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const radius = 0.15;

        const component = new THREE.Mesh(
          new THREE.BoxGeometry(0.03, 0.03, 0.03),
          wireframeMaterial
        );
        component.position.set(
          Math.cos(angle) * radius,
          0.12,
          Math.sin(angle) * radius
        );
        empGroup.add(component);
      }

      // Add center capacitor
      const capacitor = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07, 0.07, 0.05, 8),
        wireframeMaterial
      );
      capacitor.position.y = 0.14;

      // Add antenna
      const antenna = new THREE.Mesh(
        new THREE.CylinderGeometry(0.01, 0.01, 0.3, 4),
        wireframeMaterial
      );
      antenna.position.set(0, 0.3, 0);

      // Add wires
      for (let i = 0; i < 4; i++) {
        const wirePath = new THREE.CurvePath();
        const angle = (i / 4) * Math.PI * 2;
        const start = new THREE.Vector3(
          Math.cos(angle) * 0.1,
          0.12,
          Math.sin(angle) * 0.1
        );
        const end = new THREE.Vector3(
          Math.cos(angle) * 0.2,
          0.12,
          Math.sin(angle) * 0.2
        );
        const mid = new THREE.Vector3(
          Math.cos(angle) * 0.15,
          0.17,
          Math.sin(angle) * 0.15
        );

        const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
        wirePath.add(curve);

        const wire = new THREE.Mesh(
          new THREE.TubeGeometry(curve, 8, 0.01, 4, false),
          wireframeMaterial
        );
        empGroup.add(wire);
      }

      empGroup.add(body, circuit, capacitor, antenna);
      return empGroup;
    }

    // Lockpick model
    function createLockpickModel() {
      const lockpickGroup = new THREE.Group();

      // Lock body
      const lockBody = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 0.3, 16),
        wireframeMaterial
      );
      lockBody.rotation.x = Math.PI / 2;

      // Lock shackle
      const curve = new THREE.CurvePath();
      const p1 = new THREE.Vector3(0, 0.15, -0.1);
      const p2 = new THREE.Vector3(0, 0.3, -0.1);
      const p3 = new THREE.Vector3(0, 0.3, 0.1);
      const p4 = new THREE.Vector3(0, 0.15, 0.1);

      curve.add(new THREE.LineCurve3(p1, p2));
      curve.add(new THREE.LineCurve3(p2, p3));
      curve.add(new THREE.LineCurve3(p3, p4));

      const shackle = new THREE.Mesh(
        new THREE.TubeGeometry(curve, 32, 0.03, 8, false),
        wireframeMaterial
      );

      // Lockpick tool
      const pick = new THREE.Mesh(
        new THREE.BoxGeometry(0.01, 0.3, 0.01),
        wireframeMaterial
      );
      pick.position.set(0, 0, 0.15);
      pick.rotation.x = Math.PI / 4;

      // Tension wrench
      const wrench = new THREE.Mesh(
        new THREE.BoxGeometry(0.01, 0.25, 0.03),
        wireframeMaterial
      );
      wrench.position.set(0.05, 0, 0.1);
      wrench.rotation.x = Math.PI / 4;
      wrench.rotation.z = Math.PI / 12;

      // Keyhole
      const keyhole = new THREE.Mesh(
        new THREE.TorusGeometry(0.05, 0.02, 8, 16, Math.PI),
        wireframeMaterial
      );
      keyhole.position.set(0, 0, 0.16);
      keyhole.rotation.x = Math.PI / 2;

      lockpickGroup.add(lockBody, shackle, pick, wrench, keyhole);
      return lockpickGroup;
    }

    // Create initial mesh
    let currentModel = 'gun';
    let mesh = createGunModel();
    scene.add(mesh);

    // Set camera position
    camera.position.z = 2.5;

    // Animation loop variables
    let rotationSpeed = 0.01;
    let currentGeometry = cubeGeometry;
    let currentRenderMode = 'wireframe';
    let frame = 0;
    let lastTime = performance.now();
    let fps = 60;

    // Effect variables
    let glitchMode = false;
    let zoomMode = false;
    let scanMode = false;
    let zoomDirection = 1;
    let layerDepth = 5;
    let scanLine = 0;

    // Model selection
    document.getElementById('shape-select').addEventListener('change', function() {
      const modelType = this.value;
      scene.remove(mesh);
      currentModel = modelType;

      updateMesh();
      document.getElementById('status-bar').firstElementChild.textContent =
        `MODEL: ${modelType.toUpperCase()}`;
    });

    // Grid mode selection
    document.getElementById('grid-mode').addEventListener('change', function() {
      currentRenderMode = this.value;
      updateMesh();
      updateLayerDepth();
      document.getElementById('status-bar').firstElementChild.textContent =
        `MODE: ${this.value.toUpperCase()}`;
    });

    // Update mesh based on current settings
    function updateMesh() {
      scene.remove(mesh);

      let modelGroup;

      switch(currentModel) {
        case 'gun':
          modelGroup = createGunModel();
          break;
        case 'server':
          modelGroup = createServerModel();
          break;
        case 'emp':
          modelGroup = createEMPModel();
          break;
        case 'lockpick':
          modelGroup = createLockpickModel();
          break;
        default:
          modelGroup = createGunModel();
      }

      // Apply materials based on current render mode
      modelGroup.traverse((object) => {
        if (object.isMesh) {
          switch(currentRenderMode) {
            case 'wireframe':
              object.material = wireframeMaterial;
              break;
            case 'solid':
              object.material = solidMaterial;
              break;
            case 'points':
              // For points mode, we need to replace the mesh with points
              const pointsGeom = object.geometry.clone();
              const points = new THREE.Points(pointsGeom, pointsMaterial);
              points.position.copy(object.position);
              points.rotation.copy(object.rotation);
              points.scale.copy(object.scale);
              object.parent.add(points);
              object.parent.remove(object);
              break;
          }
        }
      });

      mesh = modelGroup;
      scene.add(mesh);
    }

    // Speed slider
    document.getElementById('speed-slider').addEventListener('input', function() {
      rotationSpeed = this.value * 0.002;
      document.getElementById('status-bar').firstElementChild.textContent =
        `Speed: ${this.value}/10`;
    });

    // Effect buttons
    document.getElementById('glitch-button').addEventListener('click', function() {
      glitchMode = !glitchMode;
      this.style.borderStyle = glitchMode ? 'inset' : 'outset';
      document.getElementById('status-bar').firstElementChild.textContent =
        glitchMode ? 'GLITCH ENABLED' : 'Ready';
    });

    document.getElementById('zoom-button').addEventListener('click', function() {
      zoomMode = !zoomMode;
      this.style.borderStyle = zoomMode ? 'inset' : 'outset';
      document.getElementById('status-bar').firstElementChild.textContent =
        zoomMode ? 'ZOOM ENABLED' : 'Ready';
    });

    document.getElementById('scan-button').addEventListener('click', function() {
      scanMode = !scanMode;
      this.style.borderStyle = scanMode ? 'inset' : 'outset';
      document.getElementById('status-bar').firstElementChild.textContent =
        scanMode ? 'SCANNING...' : 'Ready';
    });

    // Layer depth slider
    document.getElementById('depth-slider').addEventListener('input', function() {
      layerDepth = parseInt(this.value);
      updateLayerDepth();
      document.getElementById('status-bar').firstElementChild.textContent =
        `DEPTH: ${this.value}/10`;
    });

    // Create layered duplicates of the model for depth effect
    let layerMeshes = [];

    function updateLayerDepth() {
      // Remove existing layer meshes
      layerMeshes.forEach(layer => scene.remove(layer));
      layerMeshes = [];

      if (layerDepth <= 1) return;

      // Create new layer duplicates
      for (let i = 1; i < layerDepth; i++) {
        if (mesh) {
          const layerMesh = mesh.clone();

          // Scale and position the layer
          const scale = 1 + (i * 0.03);
          const offset = -i * 0.05;

          layerMesh.scale.set(scale, scale, scale);
          layerMesh.position.z = offset;

          // Make the layer semi-transparent
          layerMesh.traverse((object) => {
            if (object.isMesh) {
              const newMaterial = object.material.clone();
              newMaterial.transparent = true;
              newMaterial.opacity = 0.3 - (i * 0.02);
              object.material = newMaterial;
            }
          });

          scene.add(layerMesh);
          layerMeshes.push(layerMesh);
        }
      }
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      frame++;
      if (frame % 10 === 0) {
        const currentTime = performance.now();
        fps = Math.round(1000 / ((currentTime - lastTime) / 10));
        lastTime = currentTime;
        document.getElementById('fps-counter').textContent = `${fps} FPS`;
      }

      // Rotate the mesh
      if (mesh) {
        mesh.rotation.x += rotationSpeed;
        mesh.rotation.y += rotationSpeed * 1.3;
      }

      // Glitch effect (randomly distort geometry)
      if (glitchMode && frame % 30 === 0) {
        if (currentRenderMode !== 'points') {
          const positions = mesh.geometry.attributes.position.array;
          for (let i = 0; i < positions.length; i += 3) {
            if (Math.random() > 0.8) {
              positions[i] += (Math.random() - 0.5) * 0.1;
              positions[i+1] += (Math.random() - 0.5) * 0.1;
              positions[i+2] += (Math.random() - 0.5) * 0.1;
            }
          }
          mesh.geometry.attributes.position.needsUpdate = true;
        }
      }

      // Zoom effect
      if (zoomMode) {
        camera.position.z += 0.01 * zoomDirection;
        if (camera.position.z > 3.5) zoomDirection = -1;
        if (camera.position.z < 1.5) zoomDirection = 1;
      } else {
        // Gradually return to default position
        camera.position.z += (2.5 - camera.position.z) * 0.05;
      }

      // Animate lights
      pinkLight.position.x = 2 * Math.sin(Date.now() * 0.001);
      pinkLight.position.y = 2 * Math.cos(Date.now() * 0.001);
      blueLight.position.x = 2 * Math.cos(Date.now() * 0.0015);
      blueLight.position.z = 2 * Math.sin(Date.now() * 0.0015);

      // Animate sun
      sun.rotation.y += 0.005;

      // Scan effect
      if (scanMode && frame % 2 === 0) {
        scanLine += 3;
        if (scanLine > 230) scanLine = 0;

        const scanDiv = document.createElement('div');
        scanDiv.style.position = 'absolute';
        scanDiv.style.left = '0';
        scanDiv.style.top = `${scanLine}px`;
        scanDiv.style.width = '100%';
        scanDiv.style.height = '3px';
        scanDiv.style.backgroundColor = 'rgba(0, 255, 255, 0.5)';
        scanDiv.style.zIndex = '25';
        scanDiv.style.pointerEvents = 'none';
        scanDiv.style.boxShadow = '0 0 8px #00ffff';

        const oldScan = document.querySelector('.active-scan-line');
        if (oldScan) oldScan.remove();

        scanDiv.classList.add('active-scan-line');
        document.getElementById('scene-container').appendChild(scanDiv);
      }

      // Animate layer meshes
      if (layerMeshes.length > 0) {
        layerMeshes.forEach((layer, index) => {
          if (layer) {
            // Slightly offset rotation to create a trailing effect
            const offsetMultiplier = 0.8 - (index * 0.1);
            layer.rotation.x = mesh.rotation.x * offsetMultiplier;
            layer.rotation.y = mesh.rotation.y * offsetMultiplier;

            // Pulse effect on layers
            const pulseScale = 1 + (index * 0.03) + (Math.sin(Date.now() * 0.002 + index * 0.5) * 0.03);
            layer.scale.set(pulseScale, pulseScale, pulseScale);
          }
        });
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
