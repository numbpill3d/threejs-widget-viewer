<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Sigil Banner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* Main banner container */
        .sigil-banner {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 160px;
            background:
                linear-gradient(45deg, #000000 0%, #1a0000 25%, #000000 50%, #1a0000 75%, #000000 100%),
                linear-gradient(135deg, #0a0a0a 0%, #200000 30%, #0a0a0a 70%, #200000 100%);
            border: 3px solid #440000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow:
                0 0 40px rgba(136, 0, 0, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.9),
                inset 0 0 20px rgba(136, 0, 0, 0.1),
                0 8px 32px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            transition: all 0.4s ease;
            transform: perspective(1000px) rotateX(2deg);
        }
        .sigil-banner:hover {
            border-color: #880000;
            box-shadow:
                0 0 60px rgba(170, 0, 0, 0.6),
                inset 0 0 80px rgba(0, 0, 0, 0.95),
                inset 0 0 30px rgba(170, 0, 0, 0.2),
                0 12px 48px rgba(136, 0, 0, 0.4);
            transform: perspective(1000px) rotateX(0deg);
        }
        /* Three.js canvas container */
        .canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Overlay effects */
        .overlay-effects {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        /* Multiple depth layers */
        .depth-layer-1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(136, 0, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(68, 0, 0, 0.15) 0%, transparent 40%);
            z-index: 1;
        }
        .depth-layer-2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(45deg, transparent 0%, rgba(136, 0, 0, 0.05) 25%, transparent 50%),
                linear-gradient(-45deg, transparent 0%, rgba(68, 0, 0, 0.08) 75%, transparent 100%);
            z-index: 3;
        }
        .depth-layer-3 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                conic-gradient(from 0deg at 50% 50%,
                    transparent 0deg,
                    rgba(136, 0, 0, 0.03) 90deg,
                    transparent 180deg,
                    rgba(68, 0, 0, 0.05) 270deg,
                    transparent 360deg);
            z-index: 4;
        }
        /* Enhanced glitch scanlines */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 1px,
                    rgba(136, 0, 0, 0.1) 1px,
                    rgba(136, 0, 0, 0.1) 2px,
                    transparent 2px,
                    transparent 4px,
                    rgba(68, 0, 0, 0.05) 4px,
                    rgba(68, 0, 0, 0.05) 5px
                );
            animation: scanline-flicker 2.5s infinite linear;
            z-index: 5;
        }
        /* Enhanced glitch effect */
        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 100px,
                    rgba(255, 0, 0, 0.02) 100px,
                    rgba(255, 0, 0, 0.02) 102px
                );
            animation: glitch-drift 8s infinite ease-in-out;
            z-index: 6;
        }
        @keyframes glitch-drift {
            0%, 100% { transform: translateX(0); opacity: 0.5; }
            25% { transform: translateX(-2px); opacity: 0.8; }
            50% { transform: translateX(1px); opacity: 0.3; }
            75% { transform: translateX(-1px); opacity: 0.9; }
        }
        @keyframes scanline-flicker {
            0%, 98% { opacity: 0.8; }
            99%, 100% { opacity: 0.2; }
        }
        /* Ambient glow */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(136, 0, 0, 0.3) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse-glow 4s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; }
        }
        /* Spark particles */
        .spark {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ff6600;
            border-radius: 50%;
            opacity: 0;
            animation: spark-burst 2s linear infinite;
        }
        @keyframes spark-burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
                box-shadow: 0 0 4px #ff6600;
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0.2);
                box-shadow: 0 0 8px #ff3300;
            }
        }
        /* Status text overlay */
        .status-text {
            position: absolute;
            bottom: 10px;
            left: 15px;
            color: #880000;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 3;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        .sigil-banner:hover .status-text {
            opacity: 1;
            color: #cc0000;
        }
        /* Responsive design with enhanced depth preservation */
        @media (max-width: 768px) {
            .sigil-banner {
                height: 140px;
                max-width: 100%;
                transform: perspective(800px) rotateX(1deg);
            }

            .sigil-banner:hover {
                transform: perspective(800px) rotateX(0deg);
            }

            .status-text {
                font-size: 8px;
                letter-spacing: 1px;
            }
        }
        @media (max-width: 480px) {
            .sigil-banner {
                height: 120px;
                transform: perspective(600px) rotateX(1deg);
            }

            .status-text {
                font-size: 7px;
                letter-spacing: 0.5px;
                bottom: 8px;
                left: 12px;
            }
        }
        /* Demo page styling */
        .demo-container {
            width: 100%;
            max-width: 900px;
        }
        .demo-title {
            color: #880000;
            text-align: center;
            margin-bottom: 30px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .demo-description {
            color: #666;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
            <div class="demo-container">
        <div class="sigil-banner" id="sigilBanner">
            <div class="canvas-container" id="canvasContainer"></div>

            <div class="overlay-effects">
                <div class="depth-layer-1"></div>
                <div class="depth-layer-2"></div>
                <div class="depth-layer-3"></div>
                <div class="ambient-glow"></div>
                <div class="scanlines"></div>
                <div class="glitch-overlay"></div>
            </div>

            <div class="status-text">
                ◦ SIGIL ACTIVE ◦ FREQUENCY: 88.0 ◦
            </div>
        </div>
    </div>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Sigil banner Three.js implementation
        class SigilBanner {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.isHovered = false;
                this.time = 0;
                this.sparkTimer = 0;

                this.init();
                this.createSigil();
                this.setupLighting();
                this.setupEventListeners();
                this.animate();
            }
            init() {
                // Scene setup
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(45, this.container.offsetWidth / this.container.offsetHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

                this.renderer.setSize(this.container.offsetWidth, this.container.offsetHeight);
                this.renderer.setClearColor(0x000000, 0);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                this.container.appendChild(this.renderer.domElement);

                // Camera position
                this.camera.position.set(0, 0, 5);
                this.camera.lookAt(0, 0, 0);
            }
            createSigil() {
                // Create multi-layered sigil with extreme depth
                const sigilGroup = new THREE.Group();

                // Background depth layer - large metallic substrate
                const backPlateGeometry = new THREE.CylinderGeometry(2.0, 2.0, 0.05, 64);
                const backPlateMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1a1a1a,
                    metalness: 0.9,
                    roughness: 0.4,
                    emissive: 0x110000,
                    emissiveIntensity: 0.05
                });

                const backPlate = new THREE.Mesh(backPlateGeometry, backPlateMaterial);
                backPlate.position.z = -0.5;
                backPlate.castShadow = true;
                backPlate.receiveShadow = true;
                sigilGroup.add(backPlate);
                // Secondary depth ring structure
                for (let layer = 0; layer < 4; layer++) {
                    const ringRadius = 1.8 - (layer * 0.3);
                    const ringGeometry = new THREE.RingGeometry(ringRadius - 0.1, ringRadius, 32);
                    const ringMaterial = new THREE.MeshStandardMaterial({
                        color: 0x333333,
                        metalness: 0.8,
                        roughness: 0.3,
                        emissive: 0x220000,
                        emissiveIntensity: 0.1,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.8 - (layer * 0.15)
                    });

                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.position.z = -0.3 + (layer * 0.1);
                    ring.rotation.z = (layer * Math.PI) / 8;
                    sigilGroup.add(ring);
                }
                // Main sigil plate (elevated)
                const plateGeometry = new THREE.CylinderGeometry(1.4, 1.4, 0.15, 32);
                const plateMaterial = new THREE.MeshStandardMaterial({
                    color: 0x444444,
                    metalness: 0.9,
                    roughness: 0.1,
                    emissive: 0x330000,
                    emissiveIntensity: 0.15
                });

                this.sigilPlate = new THREE.Mesh(plateGeometry, plateMaterial);
                this.sigilPlate.position.z = 0.0;
                this.sigilPlate.castShadow = true;
                this.sigilPlate.receiveShadow = true;
                sigilGroup.add(this.sigilPlate);
                // Tribal pattern rings with depth variation
                for (let i = 0; i < 5; i++) {
                    const ringGeometry = new THREE.RingGeometry(0.25 + i * 0.22, 0.3 + i * 0.22, 24);
                    const ringMaterial = new THREE.MeshStandardMaterial({
                        color: 0x666666,
                        metalness: 0.95,
                        roughness: 0.05,
                        emissive: 0x440000,
                        emissiveIntensity: 0.2 + (i * 0.05),
                        side: THREE.DoubleSide
                    });

                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.position.z = 0.08 + (i * 0.02);
                    ring.rotation.z = (i * Math.PI) / 6;
                    sigilGroup.add(ring);
                }
                // Central elevated platform
                const centerGeometry = new THREE.CylinderGeometry(0.6, 0.6, 0.2, 16);
                const centerMaterial = new THREE.MeshStandardMaterial({
                    color: 0x555555,
                    metalness: 1.0,
                    roughness: 0.0,
                    emissive: 0x550000,
                    emissiveIntensity: 0.3
                });

                const centerPlatform = new THREE.Mesh(centerGeometry, centerMaterial);
                centerPlatform.position.z = 0.2;
                centerPlatform.castShadow = true;
                sigilGroup.add(centerPlatform);
                // Primary sigil spikes (elevated)
                this.sigilSpikes = [];
                for (let i = 0; i < 12; i++) {
                    const spikeGeometry = new THREE.ConeGeometry(0.04, 0.5, 6);
                    const spikeMaterial = new THREE.MeshStandardMaterial({
                        color: 0x888888,
                        metalness: 1.0,
                        roughness: 0.0,
                        emissive: 0x660000,
                        emissiveIntensity: 0.4
                    });

                    const spike = new THREE.Mesh(spikeGeometry, spikeMaterial);
                    const angle = (i / 12) * Math.PI * 2;
                    spike.position.set(Math.cos(angle) * 0.8, Math.sin(angle) * 0.8, 0.45);
                    spike.rotation.z = angle + Math.PI / 2;
                    spike.castShadow = true;

                    this.sigilSpikes.push(spike);
                    sigilGroup.add(spike);
                }
                // Secondary smaller spikes (different depth)
                this.secondarySpikes = [];
                for (let i = 0; i < 8; i++) {
                    const spikeGeometry = new THREE.ConeGeometry(0.03, 0.3, 4);
                    const spikeMaterial = new THREE.MeshStandardMaterial({
                        color: 0x999999,
                        metalness: 1.0,
                        roughness: 0.1,
                        emissive: 0x440000,
                        emissiveIntensity: 0.3
                    });

                    const spike = new THREE.Mesh(spikeGeometry, spikeMaterial);
                    const angle = (i / 8) * Math.PI * 2 + Math.PI / 8;
                    spike.position.set(Math.cos(angle) * 0.5, Math.sin(angle) * 0.5, 0.35);
                    spike.rotation.z = angle + Math.PI / 2;

                    this.secondarySpikes.push(spike);
                    sigilGroup.add(spike);
                }
                // Hidden engravings at multiple depths
                this.hiddenEngravings = [];
                for (let layer = 0; layer < 3; layer++) {
                    for (let i = 0; i < 16; i++) {
                        const engravingGeometry = new THREE.BoxGeometry(0.015, 0.12, 0.008);
                        const engravingMaterial = new THREE.MeshStandardMaterial({
                            color: 0x777777,
                            metalness: 0.9,
                            roughness: 0.2,
                            emissive: 0x880000,
                            emissiveIntensity: 0.0,
                            transparent: true,
                            opacity: 0.0
                        });

                        const engraving = new THREE.Mesh(engravingGeometry, engravingMaterial);
                        const angle = (i / 16) * Math.PI * 2;
                        const radius = 1.0 + (layer * 0.2);
                        engraving.position.set(
                            Math.cos(angle) * radius,
                            Math.sin(angle) * radius,
                            0.1 + (layer * 0.05)
                        );
                        engraving.rotation.z = angle + (layer * Math.PI / 16);

                        this.hiddenEngravings.push(engraving);
                        sigilGroup.add(engraving);
                    }
                }
                // Floating geometric elements for depth
                this.floatingElements = [];
                for (let i = 0; i < 6; i++) {
                    const elemGeometry = new THREE.OctahedronGeometry(0.08, 0);
                    const elemMaterial = new THREE.MeshStandardMaterial({
                        color: 0x666666,
                        metalness: 0.8,
                        roughness: 0.2,
                        emissive: 0x330000,
                        emissiveIntensity: 0.2,
                        transparent: true,
                        opacity: 0.7
                    });

                    const element = new THREE.Mesh(elemGeometry, elemMaterial);
                    const angle = (i / 6) * Math.PI * 2;
                    element.position.set(
                        Math.cos(angle) * 1.6,
                        Math.sin(angle) * 1.6,
                        0.6 + Math.sin(i) * 0.3
                    );

                    this.floatingElements.push(element);
                    sigilGroup.add(element);
                }
                this.sigilGroup = sigilGroup;
                this.scene.add(sigilGroup);
            }
            setupLighting() {
                // Multi-layered lighting system for enhanced depth
                const ambientLight = new THREE.AmbientLight(0x220000, 0.3);
                this.scene.add(ambientLight);
                // Primary red point light (elevated)
                this.redLight = new THREE.PointLight(0xff0000, 1.2, 15);
                this.redLight.position.set(0, 0, 4);
                this.redLight.castShadow = true;
                this.redLight.shadow.mapSize.width = 2048;
                this.redLight.shadow.mapSize.height = 2048;
                this.redLight.shadow.camera.near = 0.1;
                this.redLight.shadow.camera.far = 10;
                this.scene.add(this.redLight);
                // Secondary lighting for depth layers
                this.accentLight1 = new THREE.DirectionalLight(0xff2200, 0.4);
                this.accentLight1.position.set(-3, 2, 3);
                this.accentLight1.castShadow = true;
                this.scene.add(this.accentLight1);
                this.accentLight2 = new THREE.DirectionalLight(0x884400, 0.3);
                this.accentLight2.position.set(3, -2, 2);
                this.scene.add(this.accentLight2);
                // Rim lighting for metallic edges
                this.rimLight = new THREE.SpotLight(0xffaa00, 0.8, 8, Math.PI / 6, 0.3);
                this.rimLight.position.set(0, 4, 2);
                this.rimLight.target = this.sigilGroup;
                this.scene.add(this.rimLight);
                // Depth accent lights
                this.depthLight1 = new THREE.PointLight(0x660000, 0.5, 5);
                this.depthLight1.position.set(2, 0, 1);
                this.scene.add(this.depthLight1);
                this.depthLight2 = new THREE.PointLight(0x440000, 0.4, 4);
                this.depthLight2.position.set(-2, 0, 0.5);
                this.scene.add(this.depthLight2);
            }
            setupEventListeners() {
                const banner = document.getElementById('sigilBanner');

                banner.addEventListener('mouseenter', () => {
                    this.isHovered = true;
                    this.revealEngravings();
                });

                banner.addEventListener('mouseleave', () => {
                    this.isHovered = false;
                    this.hideEngravings();
                });
                // Responsive resize
                window.addEventListener('resize', () => {
                    this.handleResize();
                });
            }
            revealEngravings() {
                this.hiddenEngravings.forEach((engraving, index) => {
                    setTimeout(() => {
                        this.animateProperty(engraving.material, 'emissiveIntensity', 0.4, 300);
                        this.animateProperty(engraving.material, 'opacity', 0.8, 300);
                    }, index * 50);
                });
            }
            hideEngravings() {
                this.hiddenEngravings.forEach((engraving, index) => {
                    setTimeout(() => {
                        this.animateProperty(engraving.material, 'emissiveIntensity', 0.0, 200);
                        this.animateProperty(engraving.material, 'opacity', 0.0, 200);
                    }, index * 30);
                });
            }
            animateProperty(object, property, targetValue, duration) {
                const startValue = object[property];
                const startTime = Date.now();

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = this.easeInOutCubic(progress);

                    object[property] = startValue + (targetValue - startValue) * eased;

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    }
                };

                animate();
            }
            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1;
            }
            createSpark() {
                const spark = document.createElement('div');
                spark.className = 'spark';

                // Random position around the sigil edge
                const angle = Math.random() * Math.PI * 2;
                const radius = 60 + Math.random() * 20;
                const x = Math.cos(angle) * radius + this.container.offsetWidth / 2;
                const y = Math.sin(angle) * radius + this.container.offsetHeight / 2;

                spark.style.left = x + 'px';
                spark.style.top = y + 'px';

                // Random direction for spark movement
                const dx = (Math.random() - 0.5) * 50 + 'px';
                const dy = (Math.random() - 0.5) * 50 + 'px';
                spark.style.setProperty('--dx', dx);
                spark.style.setProperty('--dy', dy);

                this.container.appendChild(spark);

                // Remove spark after animation
                setTimeout(() => {
                    if (spark.parentNode) {
                        spark.parentNode.removeChild(spark);
                    }
                }, 2000);
            }
            handleResize() {
                const width = this.container.offsetWidth;
                const height = this.container.offsetHeight;

                this.camera.aspect = width / height;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(width, height);
            }
            animate() {
                requestAnimationFrame(() => this.animate());

                this.time += 0.016;
                this.sparkTimer += 0.016;
                // Multi-layered rotation system with depth-based speeds
                const baseRotation = this.isHovered ? 0.025 : 0.008;
                this.sigilGroup.rotation.z += baseRotation;
                // Animate primary spike arrays
                this.sigilSpikes.forEach((spike, index) => {
                    const offset = index * 0.5;
                    const intensity = 0.4 + Math.sin(this.time * 2.5 + offset) * 0.3;
                    spike.material.emissiveIntensity = intensity;
                    spike.position.z = 0.45 + Math.sin(this.time * 1.5 + offset) * 0.05;
                });
                // Animate secondary spikes with different frequency
                this.secondarySpikes.forEach((spike, index) => {
                    const offset = index * 0.7;
                    const intensity = 0.3 + Math.sin(this.time * 3 + offset) * 0.2;
                    spike.material.emissiveIntensity = intensity;
                    spike.rotation.y = Math.sin(this.time + offset) * 0.2;
                });
                // Floating elements orbital motion
                this.floatingElements.forEach((element, index) => {
                    const orbitSpeed = 0.01 + (index * 0.002);
                    const orbitRadius = 1.6;
                    const baseAngle = (index / 6) * Math.PI * 2;
                    const currentAngle = baseAngle + this.time * orbitSpeed;

                    element.position.x = Math.cos(currentAngle) * orbitRadius;
                    element.position.y = Math.sin(currentAngle) * orbitRadius;
                    element.position.z = 0.6 + Math.sin(this.time * 2 + index) * 0.3;

                    element.rotation.x += 0.02;
                    element.rotation.y += 0.015;

                    const pulseIntensity = 0.2 + Math.sin(this.time * 4 + index) * 0.1;
                    element.material.emissiveIntensity = pulseIntensity;
                });
                // Dynamic lighting system
                this.redLight.intensity = 1.2 + Math.sin(this.time * 1.8) * 0.4;
                this.redLight.position.x = Math.sin(this.time * 0.5) * 0.5;

                this.accentLight1.intensity = 0.4 + Math.sin(this.time * 2.2) * 0.2;
                this.accentLight2.intensity = 0.3 + Math.cos(this.time * 1.7) * 0.15;

                this.rimLight.intensity = 0.8 + Math.sin(this.time * 3) * 0.3;

                this.depthLight1.position.x = 2 + Math.sin(this.time * 0.8) * 0.5;
                this.depthLight1.intensity = 0.5 + Math.cos(this.time * 2.5) * 0.2;

                this.depthLight2.position.y = Math.cos(this.time * 0.6) * 0.8;
                this.depthLight2.intensity = 0.4 + Math.sin(this.time * 2.8) * 0.1;
                // Enhanced spark generation with depth awareness
                if (this.sparkTimer > 0.8 + Math.random() * 1.5) {
                    this.createSpark();
                    this.sparkTimer = 0;
                }
                // Aggressive glitch effects on multiple elements
                if (Math.random() < 0.025) {
                    this.sigilPlate.material.emissiveIntensity = 0.8;
                    setTimeout(() => {
                        this.sigilPlate.material.emissiveIntensity = 0.15;
                    }, 80);
                }
                // Secondary glitch on floating elements
                if (Math.random() < 0.015) {
                    const randomElement = this.floatingElements[Math.floor(Math.random() * this.floatingElements.length)];
                    randomElement.material.emissiveIntensity = 0.9;
                    setTimeout(() => {
                        randomElement.material.emissiveIntensity = 0.2;
                    }, 120);
                }
                // Depth-based camera subtle movement for parallax effect
                this.camera.position.x = Math.sin(this.time * 0.3) * 0.1;
                this.camera.position.y = Math.cos(this.time * 0.4) * 0.08;
                this.renderer.render(this.scene, this.camera);
            }
        }
        // Initialize the sigil banner when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new SigilBanner('canvasContainer');
        });
    </script>
</body>
</html>
